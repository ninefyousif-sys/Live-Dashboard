<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-Shop Body Shop — Live Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0e0e10;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
  #box{background:#1a1a1c;border:1px solid #2e2e30;border-radius:16px;padding:48px 56px;width:400px;max-width:92vw;text-align:center;}
  .logo{font-size:12px;color:#5F5E5A;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
  h2{font-size:26px;font-weight:400;color:#f0efeb;margin-bottom:30px;}
  #pw{width:100%;background:#111113;border:1px solid #3a3a3c;border-radius:8px;color:#f0efeb;font-size:28px;padding:14px 16px;text-align:center;outline:none;margin-bottom:18px;letter-spacing:6px;}
  #pw:focus{border-color:#378ADD;}
  #btn{width:100%;background:#378ADD;color:#fff;border:none;border-radius:8px;padding:14px;font-size:16px;cursor:pointer;font-weight:500;}
  #btn:hover{background:#4a9ee8;}
  #btn:disabled{background:#2a5a8a;cursor:wait;}
  #err{color:#F0997B;font-size:13px;margin-top:12px;display:none;}
  #info{color:#5F5E5A;font-size:12px;margin-top:12px;display:none;}
</style>
</head>
<body>
<div id="box">
  <div class="logo">Volvo Cars Charleston</div>
  <h2>A-Shop Live Dashboard</h2>
  <input id="pw" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="off"
    onkeydown="if(event.key==='Enter')unlock()"/>
  <button id="btn" onclick="unlock()">Connect &rarr;</button>
  <div id="err">Incorrect password. Try again.</div>
  <div id="info">Decrypting&hellip;</div>
</div>

  if (e.key === 'F12') { e.preventDefault(); return false; }
  if (e.ctrlKey && e.shiftKey && ['i','j','c','k','u'].indexOf(k) !== -1) { e.preventDefault(); return false; }
  if (e.ctrlKey && ['u','s','p'].indexOf(k) !== -1) { e.preventDefault(); return false; }
});

function _b64(s){
  var bin=atob(s), a=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i);
  return a;
}

async function unlock(){
  var pw = document.getElementById('pw').value;
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  var info = document.getElementById('info');
  err.style.display='none';
  btn.disabled=true; btn.textContent='Working…';
  info.style.display='block';
  try{
    var data = _b64(_D);
    var iter = (data[0]<<24)|(data[1]<<16)|(data[2]<<8)|data[3];
    var salt  = data.slice(4,20);
    var nonce = data.slice(20,32);
    var cipher= data.slice(32);
    var enc   = new TextEncoder();
    var km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key= await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:salt, iterations:iter, hash:'SHA-256'},
      km, {name:'AES-GCM',length:256}, false, ['decrypt']
    );
    var plain = await crypto.subtle.decrypt({name:'AES-GCM',iv:nonce}, key, cipher);
    var html  = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  }catch(ex){
    err.style.display='block';
    document.getElementById('pw').value='';
    btn.disabled=false; btn.textContent='Connect →';
    info.style.display='none';
  }
}
